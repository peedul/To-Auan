
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For you Auan ❤️</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    text-align:center;
    color:black;
}

/* title */
h1{
    margin-top:40px;
    font-size:40px;
}

/* photo gallery */

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.gallery img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:transform 0.3s;
}

.gallery img:hover{
    transform:scale(1.08);
}

/* message box */

.message{
    width:70%;
    margin:40px auto;
    background:rgba(255,255,255,0.5);
    padding:30px;
    border-radius:20px;
}

.message h2{
    margin-bottom:10px;
}

/* floating hearts */

.heart{
    position:fixed;
    bottom:-10px;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-100vh);opacity:0;}
}

</style>
</head>

<body>

<h1>For My Beautiful Girl ❤️</h1>

<!-- PHOTO GALLERY -->
<div class="gallery">

<img src="img1.jpg.jpg">
<img src="img2.jpg.jpg">
<img src="img3.jpg.jpg">
<img src="img4.jpg.jpg">
<img src="img5.jpg.jpg">
<img src="img6.jpg.jpg">
<img src="img7.jpg.jpeg">

</div>

<!-- LOVE MESSAGE -->

<div class="message">

<h2>🌟</h2>

<p>
Auan Kub did you know i love you everyday and i watching you for a long time.
you have a lot of intension for learning. I don't know how to tell my emotion to you.
But i want you to know i will be with you forever Congratulation Na Kubb.
</p>

</div>

<!-- BACKGROUND MUSIC -->

<iframe width="0" height="0"
src="https://youtu.be/4AOu-DLjGxg?si=a2f1OHdrBcwxqowg"
frameborder="0"
allow="autoplay">
</iframe>

<!-- FLOATING HEARTS -->

<script>

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
