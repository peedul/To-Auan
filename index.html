<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Auan</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7,#ffc3a0);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Envelope */
.envelope{
  position:relative;
  z-index:10;
  width:320px;
  height:220px;
  background:#ffffff;
  border-radius:14px;
  cursor:pointer;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  border:2px solid #000000;
  transition:.6s;
}

.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ffffff;
  clip-path:polygon(0 0,100% 0,50% 65%);
  transform-origin:top;
  transition:.6s;
  border-top-left-radius:14px;
  border-top-right-radius:14px;
  border:2px solid #000000;
  border-bottom:2px solid #000000;
}

.envelope.open:before{
  transform:rotateX(180deg);
}

.open-text{
  position:absolute;
  width:100%;
  text-align:center;
  top:70%;
  color:#000000;
  font-weight:bold;
  font-size:1.1em;
}

/* Main Card */
.container{
  position:absolute;
  background:rgba(255,255,255,0.95);
  padding:50px;
  border-radius:30px;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
  max-width:750px;
  text-align:center;
  opacity:0;
  transform:scale(.8);
  transition:1s;
}

.container.show{
  opacity:1;
  transform:scale(1);
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:4em;
  color:#ff2e63;
  margin-bottom:20px;
}

p{
  font-size:1.2em;
  margin-bottom:18px;
  color:#444;
}

.love{
  font-size:1.5em;
  color:#d1005b;
  font-weight:bold;
}

button{
  margin-top:15px;
  padding:15px 35px;
  border:none;
  border-radius:40px;
  background:#ff2e63;
  color:white;
  font-size:1.2em;
  cursor:pointer;
  transition:.4s;
}

button:hover{transform:scale(1.08)}
button:active{transform:scale(.95)}

.hidden-message{
  opacity:0;
  transform:translateY(20px);
  transition:1s;
  margin-top:25px;
  font-size:1.3em;
  color:#ff2e63;
}

.show-message{
  opacity:1;
  transform:translateY(0);
}

.heart{
  pointer-events:none;
  position:absolute;
  bottom:-30px;
  font-size:22px;
  color:#ff5d96;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(0);opacity:1}
  to{transform:translateY(-110vh);opacity:0}
}
</style>
</head>

<body>

<!-- Letter Envelope -->
<div class="envelope" onclick="openLetter(this)">
  <div class="open-text">💌 Click to Open</div>
</div>

<!-- Hidden Website -->
<div class="container" id="mainCard">
  <h1>Congratulations Kub Auan 💖</h1>
  <p>You finished 12th grade and I couldn't be more proud of you.</p>
  <p>Your have a hard work before you graduate and tired of sleep late everyday.</p>
  <p>This is only the beginning and i will be on your side forever ✨</p>
  <p class="love">I love you Naaaa 💖</p>

  <a href="heart.html">
  <button onclick="showMessage()">Open Naaa ❤️</button>
</a>
  

</div>

<!-- Romantic Music -->
<div id="music" style="display:none;">
  <iframe id="ytplayer"
    width="0"
    height="0"
    src=""
    frameborder="0"
    allow="autoplay">
  </iframe>
</div>

<script>
function openLetter(el){
  el.classList.add('open');

  // start romantic music after click
  document.getElementById("ytplayer").src =
    "https://www.youtube.com/embed/wJex6piMxKA?autoplay=1&loop=1&playlist=wJex6piMxKA";

  setTimeout(()=>{
    el.style.display='none';
    document.getElementById('mainCard').classList.add('show');
  },600);
}

function showMessage(){
  document.getElementById('message').classList.add('show-message');
}

function createHeart(){
  const heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=(5+Math.random()*5)+'s';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),10000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
